<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materi Detail - Lo-Fi Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background-color: #fafafa;
            padding: 40px;
        }
        
        .wireframe {
            max-width: 1400px;
            margin: 0 auto;
            border: 2px solid #333;
            background-color: #fff;
        }
        
        .header {
            border-bottom: 2px solid #333;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-box {
            border: 2px solid #666;
            padding: 8px 16px;
            font-size: 11px;
            color: #666;
        }
        
        .header-box.logo {
            width: 100px;
        }
        
        .header-box.user {
            width: 150px;
        }
        
        .main {
            display: grid;
            grid-template-columns: 200px 1fr;
            min-height: 600px;
        }
        
        .sidebar {
            border-right: 2px solid #333;
            padding: 30px 20px;
        }
        
        .nav-title {
            font-size: 10px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-item {
            border: 1px solid #999;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 11px;
            color: #666;
        }
        
        .nav-item.active {
            border: 2px solid #333;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .content {
            padding: 30px 40px;
        }
        
        .breadcrumb {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #ddd;
        }
        
        .breadcrumb-line {
            height: 10px;
            border: 1px solid #ccc;
            width: 300px;
        }
        
        .page-header {
            margin-bottom: 10px;
        }
        
        .page-title {
            height: 25px;
            border: 2px solid #333;
            width: 300px;
            margin-bottom: 10px;
        }
        
        .page-subtitle {
            height: 10px;
            border: 1px solid #ccc;
            width: 350px;
            margin-bottom: 30px;
        }
        
        .header-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        
        .btn {
            border: 2px solid #666;
            padding: 8px 20px;
            font-size: 11px;
            color: #666;
        }
        
        .btn.primary {
            border-color: #333;
            background-color: #f5f5f5;
        }
        
        /* List Items */
        .materi-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .materi-item {
            border: 2px solid #666;
            padding: 25px;
            background-color: #fff;
            position: relative;
        }
        
        .materi-item:hover {
            background-color: #fafafa;
        }
        
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .item-title {
            height: 18px;
            border-bottom: 2px solid #333;
            width: 250px;
            margin-bottom: 10px;
        }
        
        .item-meta {
            height: 10px;
            border: 1px solid #999;
            width: 150px;
        }
        
        .share-btn {
            border: 2px solid #666;
            padding: 8px 20px;
            font-size: 11px;
            color: #666;
            background-color: #f5f5f5;
        }
        
        .item-desc {
            height: 10px;
            border: 1px solid #ccc;
            width: 80%;
            margin-bottom: 8px;
        }
        
        .item-desc:last-child {
            width: 60%;
        }
        
    </style>
</head>
<body>
    
    <div class="wireframe">
        
        <header class="header">
            <div class="header-box logo">LOGO</div>
            <div class="header-box user">USER INFO</div>
        </header>
        
        <div class="main">
            
            <aside class="sidebar">
                <div class="nav-title">Navigation</div>
                <div class="nav-item">Dashboard</div>
                <div class="nav-item active">Materi</div>
                <div class="nav-item">Soal</div>
                <div class="nav-item">Tugas</div>
                <div class="nav-item">Kelas</div>
                <div class="nav-item">Siswa</div>
                <div class="nav-item">Laporan</div>
                <div class="nav-item">Rekap</div>
            </aside>
            
            <main class="content">
                
                <div class="breadcrumb">
                    <div class="breadcrumb-line"></div>
                </div>
                
                <div class="page-header">
                    <div class="page-title"></div>
                    <div class="page-subtitle"></div>
                </div>
                
                <div class="header-actions">
                    <div class="btn">← KEMBALI</div>
                </div>
                
                <div class="materi-list">
                    
                    <div class="materi-item">
                        <div class="item-header">
                            <div>
                                <div class="item-title"></div>
                                <div class="item-meta"></div>
                            </div>
                            <div class="share-btn">SHARE</div>
                        </div>
                        <div class="item-desc"></div>
                        <div class="item-desc"></div>
                    </div>
                    
                    <div class="materi-item">
                        <div class="item-header">
                            <div>
                                <div class="item-title"></div>
                                <div class="item-meta"></div>
                            </div>
                            <div class="share-btn">SHARE</div>
                        </div>
                        <div class="item-desc"></div>
                        <div class="item-desc"></div>
                    </div>
                    
                    <div class="materi-item">
                        <div class="item-header">
                            <div>
                                <div class="item-title"></div>
                                <div class="item-meta"></div>
                            </div>
                            <div class="share-btn">SHARE</div>
                        </div>
                        <div class="item-desc"></div>
                    </div>
                    
                    <div class="materi-item">
                        <div class="item-header">
                            <div>
                                <div class="item-title"></div>
                                <div class="item-meta"></div>
                            </div>
                            <div class="share-btn">SHARE</div>
                        </div>
                        <div class="item-desc"></div>
                        <div class="item-desc"></div>
                    </div>
                    
                </div>
                
            </main>
            
        </div>
        
    </div>
    
</body>
</html>
