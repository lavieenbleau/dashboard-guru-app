<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soal Detail - Lo-Fi Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background-color: #fafafa;
            padding: 40px;
        }
        
        .wireframe {
            max-width: 1400px;
            margin: 0 auto;
            border: 2px solid #333;
            background-color: #fff;
        }
        
        .header {
            border-bottom: 2px solid #333;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-box {
            border: 2px solid #666;
            padding: 8px 16px;
            font-size: 11px;
            color: #666;
        }
        
        .header-box.logo {
            width: 100px;
        }
        
        .header-box.user {
            width: 150px;
        }
        
        .main {
            display: grid;
            grid-template-columns: 200px 1fr;
            min-height: 600px;
        }
        
        .sidebar {
            border-right: 2px solid #333;
            padding: 30px 20px;
        }
        
        .nav-title {
            font-size: 10px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-item {
            border: 1px solid #999;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 11px;
            color: #666;
        }
        
        .nav-item.active {
            border: 2px solid #333;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .content {
            padding: 30px 40px;
        }
        
        .breadcrumb {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #ddd;
        }
        
        .breadcrumb-line {
            height: 10px;
            border: 1px solid #ccc;
            width: 300px;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .page-title {
            height: 25px;
            border: 2px solid #333;
            width: 200px;
        }
        
        .btn {
            border: 2px solid #666;
            padding: 8px 20px;
            font-size: 11px;
            color: #666;
        }
        
        .btn.primary {
            border-color: #333;
            background-color: #f5f5f5;
        }
        
        /* Soal List */
        .soal-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .soal-item {
            border: 2px solid #666;
            padding: 20px 25px;
            background-color: #fff;
            position: relative;
        }
        
        .soal-item:hover {
            background-color: #fafafa;
        }
        
        .item-title {
            height: 18px;
            border-bottom: 2px solid #333;
            width: 200px;
            margin-bottom: 15px;
        }
        
        .item-meta {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .meta-badge {
            border: 1px solid #999;
            padding: 4px 12px;
            font-size: 9px;
            color: #999;
        }
        
        .meta-time {
            height: 10px;
            border: 1px solid #ccc;
            width: 100px;
        }
        
        .item-actions {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
        }
        
        .action-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #999;
        }
        
    </style>
</head>
<body>
    
    <div class="wireframe">
        
        <header class="header">
            <div class="header-box logo">LOGO</div>
            <div class="header-box user">USER INFO</div>
        </header>
        
        <div class="main">
            
            <aside class="sidebar">
                <div class="nav-title">Navigation</div>
                <div class="nav-item">Dashboard</div>
                <div class="nav-item">Materi</div>
                <div class="nav-item active">Soal</div>
                <div class="nav-item">Tugas</div>
                <div class="nav-item">Kelas</div>
                <div class="nav-item">Siswa</div>
                <div class="nav-item">Laporan</div>
                <div class="nav-item">Rekap</div>
            </aside>
            
            <main class="content">
                
                <div class="breadcrumb">
                    <div class="breadcrumb-line"></div>
                </div>
                
                <div class="page-header">
                    <div class="page-title"></div>
                    <div class="btn primary">+ TAMBAH SOAL</div>
                </div>
                
                <div class="soal-list">
                    
                    <div class="soal-item">
                        <div class="item-title"></div>
                        <div class="item-meta">
                            <div class="meta-badge">BADGE</div>
                            <div class="meta-time"></div>
                        </div>
                        <div class="item-actions">
                            <div class="action-btn"></div>
                        </div>
                    </div>
                    
                    <div class="soal-item">
                        <div class="item-title"></div>
                        <div class="item-meta">
                            <div class="meta-badge">BADGE</div>
                            <div class="meta-time"></div>
                        </div>
                        <div class="item-actions">
                            <div class="action-btn"></div>
                        </div>
                    </div>
                    
                    <div class="soal-item">
                        <div class="item-title"></div>
                        <div class="item-meta">
                            <div class="meta-badge">BADGE</div>
                            <div class="meta-time"></div>
                        </div>
                        <div class="item-actions">
                            <div class="action-btn"></div>
                        </div>
                    </div>
                    
                    <div class="soal-item">
                        <div class="item-title"></div>
                        <div class="item-meta">
                            <div class="meta-badge">BADGE</div>
                            <div class="meta-time"></div>
                        </div>
                        <div class="item-actions">
                            <div class="action-btn"></div>
                        </div>
                    </div>
                    
                </div>
                
            </main>
            
        </div>
        
    </div>
    
</body>
</html>
