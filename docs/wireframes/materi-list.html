<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materi - Lo-Fi Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background-color: #fafafa;
            padding: 40px;
        }
        
        .wireframe {
            max-width: 1400px;
            margin: 0 auto;
            border: 2px solid #333;
            background-color: #fff;
        }
        
        .header {
            border-bottom: 2px solid #333;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-box {
            border: 2px solid #666;
            padding: 8px 16px;
            font-size: 11px;
            color: #666;
        }
        
        .header-box.logo {
            width: 100px;
        }
        
        .header-box.user {
            width: 150px;
        }
        
        .main {
            display: grid;
            grid-template-columns: 200px 1fr;
            min-height: 600px;
        }
        
        .sidebar {
            border-right: 2px solid #333;
            padding: 30px 20px;
        }
        
        .nav-title {
            font-size: 10px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-item {
            border: 1px solid #999;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 11px;
            color: #666;
        }
        
        .nav-item.active {
            border: 2px solid #333;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .content {
            padding: 30px 40px;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #ccc;
        }
        
        .page-title {
            height: 25px;
            border: 2px solid #333;
            width: 200px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            border: 2px solid #666;
            padding: 8px 20px;
            font-size: 11px;
            color: #666;
        }
        
        .btn.primary {
            border-color: #333;
            background-color: #f5f5f5;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid #ddd;
        }
        
        .tab {
            border: 1px solid #999;
            border-bottom: none;
            padding: 10px 20px;
            font-size: 11px;
            color: #666;
            position: relative;
            top: 2px;
        }
        
        .tab.active {
            border: 2px solid #333;
            border-bottom: 2px solid #fff;
            background-color: #fff;
            color: #333;
        }
        
        /* Mapel Grid */
        .mapel-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .mapel-card {
            border: 2px solid #666;
            padding: 25px 20px;
            position: relative;
            cursor: pointer;
        }
        
        .mapel-card:hover {
            background-color: #fafafa;
        }
        
        .mapel-icon {
            width: 50px;
            height: 50px;
            border: 2px solid #999;
            margin-bottom: 15px;
        }
        
        .mapel-name {
            height: 15px;
            border-bottom: 2px solid #666;
            width: 70%;
            margin-bottom: 10px;
        }
        
        .mapel-count {
            height: 10px;
            border: 1px solid #ccc;
            width: 50%;
        }
        
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            border: 1px solid #999;
            padding: 4px 8px;
            font-size: 9px;
            color: #999;
        }
        
    </style>
</head>
<body>
    
    <div class="wireframe">
        
        <header class="header">
            <div class="header-box logo">LOGO</div>
            <div class="header-box user">USER INFO</div>
        </header>
        
        <div class="main">
            
            <aside class="sidebar">
                <div class="nav-title">Navigation</div>
                <div class="nav-item">Dashboard</div>
                <div class="nav-item active">Materi</div>
                <div class="nav-item">Soal</div>
                <div class="nav-item">Tugas</div>
                <div class="nav-item">Kelas</div>
                <div class="nav-item">Siswa</div>
                <div class="nav-item">Laporan</div>
                <div class="nav-item">Rekap</div>
            </aside>
            
            <main class="content">
                
                <div class="page-header">
                    <div class="page-title"></div>
                    <div class="action-buttons">
                        <div class="btn">FILTER</div>
                        <div class="btn primary">+ TAMBAH</div>
                    </div>
                </div>
                
                <div class="tabs">
                    <div class="tab active">Admin</div>
                    <div class="tab">Custom</div>
                    <div class="tab">Semua</div>
                </div>
                
                <div class="mapel-grid">
                    <div class="mapel-card">
                        <div class="badge">12 items</div>
                        <div class="mapel-icon"></div>
                        <div class="mapel-name"></div>
                        <div class="mapel-count"></div>
                    </div>
                    <div class="mapel-card">
                        <div class="badge">8 items</div>
                        <div class="mapel-icon"></div>
                        <div class="mapel-name"></div>
                        <div class="mapel-count"></div>
                    </div>
                    <div class="mapel-card">
                        <div class="badge">15 items</div>
                        <div class="mapel-icon"></div>
                        <div class="mapel-name"></div>
                        <div class="mapel-count"></div>
                    </div>
                    <div class="mapel-card">
                        <div class="badge">6 items</div>
                        <div class="mapel-icon"></div>
                        <div class="mapel-name"></div>
                        <div class="mapel-count"></div>
                    </div>
                    <div class="mapel-card">
                        <div class="badge">10 items</div>
                        <div class="mapel-icon"></div>
                        <div class="mapel-name"></div>
                        <div class="mapel-count"></div>
                    </div>
                    <div class="mapel-card">
                        <div class="badge">4 items</div>
                        <div class="mapel-icon"></div>
                        <div class="mapel-name"></div>
                        <div class="mapel-count"></div>
                    </div>
                </div>
                
            </main>
            
        </div>
        
    </div>
    
</body>
</html>
