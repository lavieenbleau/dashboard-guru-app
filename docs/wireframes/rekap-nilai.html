<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Nilai - Lo-Fi Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background-color: #fafafa;
            padding: 40px;
        }
        
        .wireframe {
            max-width: 1400px;
            margin: 0 auto;
            border: 2px solid #333;
            background-color: #fff;
        }
        
        .header {
            border-bottom: 2px solid #333;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-box {
            border: 2px solid #666;
            padding: 8px 16px;
            font-size: 11px;
            color: #666;
        }
        
        .header-box.logo {
            width: 100px;
        }
        
        .header-box.user {
            width: 150px;
        }
        
        .main {
            display: grid;
            grid-template-columns: 200px 1fr;
            min-height: 600px;
        }
        
        .sidebar {
            border-right: 2px solid #333;
            padding: 30px 20px;
        }
        
        .nav-title {
            font-size: 10px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-item {
            border: 1px solid #999;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 11px;
            color: #666;
        }
        
        .nav-item.active {
            border: 2px solid #333;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .content {
            padding: 30px 40px;
        }
        
        .breadcrumb {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #ddd;
        }
        
        .breadcrumb-line {
            height: 10px;
            border: 1px solid #ccc;
            width: 250px;
        }
        
        .page-header {
            margin-bottom: 30px;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .header-left {
            flex: 1;
        }
        
        .page-title {
            height: 25px;
            border: 2px solid #333;
            width: 280px;
            margin-bottom: 10px;
        }
        
        .page-subtitle {
            height: 10px;
            border: 1px solid #ccc;
            width: 250px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            border: 2px solid #666;
            padding: 8px 20px;
            font-size: 11px;
            color: #666;
        }
        
        .btn.primary {
            border-color: #333;
            background-color: #f5f5f5;
        }
        
        /* Mapel Section */
        .mapel-section {
            margin-bottom: 40px;
        }
        
        .mapel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .mapel-icon {
            width: 20px;
            height: 20px;
            border: 2px solid #999;
        }
        
        .mapel-title {
            height: 16px;
            border-bottom: 2px solid #666;
            width: 150px;
        }
        
        /* Table */
        .table-wrapper {
            border: 2px solid #333;
            overflow-x: auto;
        }
        
        .table-header {
            display: grid;
            grid-template-columns: 60px 200px repeat(6, 80px) 100px;
            gap: 0;
            border-bottom: 2px solid #333;
            background-color: #f0f0f0;
        }
        
        .th {
            padding: 12px 10px;
            border-right: 1px solid #ddd;
            text-align: center;
        }
        
        .th-main {
            height: 12px;
            border: 1px solid #999;
            margin: 0 auto;
        }
        
        .th-group {
            border-bottom: 1px solid #ddd;
            padding: 8px 10px;
            text-align: center;
        }
        
        .th-group-title {
            height: 10px;
            border: 1px solid #999;
            width: 80px;
            margin: 0 auto 8px;
        }
        
        .th-sub-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
        }
        
        .th-sub-grid.wide {
            grid-template-columns: repeat(4, 1fr);
        }
        
        .th-sub {
            height: 10px;
            border: 1px solid #ccc;
            width: 20px;
            margin: 0 auto;
        }
        
        .table-row {
            display: grid;
            grid-template-columns: 60px 200px repeat(6, 80px) 100px;
            gap: 0;
            border-bottom: 1px solid #ddd;
        }
        
        .table-row:hover {
            background-color: #fafafa;
        }
        
        .td {
            padding: 15px 10px;
            border-right: 1px solid #f0f0f0;
            text-align: center;
        }
        
        .td-content {
            height: 12px;
            border: 1px solid #ccc;
            margin: 0 auto;
        }
        
        .td-content.number {
            width: 20px;
            border-color: #999;
        }
        
        .td-content.name {
            width: 140px;
        }
        
        .td-content.score {
            width: 30px;
            border-color: #666;
        }
        
        .td-content.avg {
            width: 40px;
            border-width: 2px;
            border-color: #333;
        }
        
        /* Info Box */
        .info-box {
            border: 2px solid #999;
            padding: 20px;
            background-color: #f5f5f5;
            margin-top: 15px;
        }
        
        .info-icon {
            width: 18px;
            height: 18px;
            border: 2px solid #999;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }
        
        .info-text {
            height: 10px;
            border: 1px solid #ccc;
            width: 300px;
            display: inline-block;
        }
        
    </style>
</head>
<body>
    
    <div class="wireframe">
        
        <header class="header">
            <div class="header-box logo">LOGO</div>
            <div class="header-box user">USER INFO</div>
        </header>
        
        <div class="main">
            
            <aside class="sidebar">
                <div class="nav-title">Navigation</div>
                <div class="nav-item">Dashboard</div>
                <div class="nav-item">Materi</div>
                <div class="nav-item">Soal</div>
                <div class="nav-item">Tugas</div>
                <div class="nav-item">Kelas</div>
                <div class="nav-item">Siswa</div>
                <div class="nav-item">Laporan</div>
                <div class="nav-item active">Rekap</div>
            </aside>
            
            <main class="content">
                
                <div class="breadcrumb">
                    <div class="breadcrumb-line"></div>
                </div>
                
                <div class="page-header">
                    <div class="header-top">
                        <div class="header-left">
                            <div class="page-title"></div>
                            <div class="page-subtitle"></div>
                        </div>
                        <div class="action-buttons">
                            <div class="btn primary">DOWNLOAD PDF</div>
                            <div class="btn">KEMBALI</div>
                        </div>
                    </div>
                </div>
                
                <!-- MATEMATIKA -->
                <div class="mapel-section">
                    <div class="mapel-header">
                        <div class="mapel-icon"></div>
                        <div class="mapel-title"></div>
                    </div>
                    
                    <div class="table-wrapper">
                        <div class="table-header">
                            <div class="th">
                                <div class="th-main"></div>
                            </div>
                            <div class="th">
                                <div class="th-main"></div>
                            </div>
                            <div class="th-group" style="grid-column: span 2;">
                                <div class="th-group-title"></div>
                                <div class="th-sub-grid">
                                    <div class="th-sub"></div>
                                    <div class="th-sub"></div>
                                </div>
                            </div>
                            <div class="th-group" style="grid-column: span 4;">
                                <div class="th-group-title"></div>
                                <div class="th-sub-grid wide">
                                    <div class="th-sub"></div>
                                    <div class="th-sub"></div>
                                    <div class="th-sub"></div>
                                    <div class="th-sub"></div>
                                </div>
                            </div>
                            <div class="th">
                                <div class="th-main"></div>
                            </div>
                        </div>
                        
                        <div class="table-row">
                            <div class="td"><div class="td-content number"></div></div>
                            <div class="td"><div class="td-content name"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content avg"></div></div>
                        </div>
                        
                        <div class="table-row">
                            <div class="td"><div class="td-content number"></div></div>
                            <div class="td"><div class="td-content name"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content avg"></div></div>
                        </div>
                        
                        <div class="table-row">
                            <div class="td"><div class="td-content number"></div></div>
                            <div class="td"><div class="td-content name"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content avg"></div></div>
                        </div>
                        
                        <div class="table-row">
                            <div class="td"><div class="td-content number"></div></div>
                            <div class="td"><div class="td-content name"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content score"></div></div>
                            <div class="td"><div class="td-content avg"></div></div>
                        </div>
                    </div>
                </div>
                
                <!-- IPA -->
                <div class="mapel-section">
                    <div class="mapel-header">
                        <div class="mapel-icon"></div>
                        <div class="mapel-title"></div>
                    </div>
                    
                    <div class="info-box">
                        <div class="info-icon"></div>
                        <div class="info-text"></div>
                    </div>
                </div>
                
            </main>
            
        </div>
        
    </div>
    
</body>
</html>
