<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan - Lo-Fi Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background-color: #fafafa;
            padding: 40px;
        }
        
        .wireframe {
            max-width: 1400px;
            margin: 0 auto;
            border: 2px solid #333;
            background-color: #fff;
        }
        
        .header {
            border-bottom: 2px solid #333;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-box {
            border: 2px solid #666;
            padding: 8px 16px;
            font-size: 11px;
            color: #666;
        }
        
        .header-box.logo {
            width: 100px;
        }
        
        .header-box.user {
            width: 150px;
        }
        
        .main {
            display: grid;
            grid-template-columns: 200px 1fr;
            min-height: 600px;
        }
        
        .sidebar {
            border-right: 2px solid #333;
            padding: 30px 20px;
        }
        
        .nav-title {
            font-size: 10px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-item {
            border: 1px solid #999;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 11px;
            color: #666;
        }
        
        .nav-item.active {
            border: 2px solid #333;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .content {
            padding: 30px 40px;
        }
        
        .page-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .header-icon {
            width: 30px;
            height: 30px;
            border: 2px solid #999;
        }
        
        .page-title {
            height: 25px;
            border: 2px solid #333;
            width: 200px;
        }
        
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        
        /* Card */
        .card {
            border: 2px solid #666;
            padding: 30px;
            background-color: #fff;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .card-icon {
            width: 20px;
            height: 20px;
            border: 2px solid #999;
        }
        
        .card-title {
            height: 16px;
            border-bottom: 2px solid #666;
            width: 150px;
        }
        
        /* Avatar Section */
        .avatar-section {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .avatar-box {
            width: 80px;
            height: 80px;
            border: 2px solid #999;
            border-radius: 5px;
            flex-shrink: 0;
        }
        
        .avatar-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .avatar-btn {
            border: 2px solid #666;
            padding: 8px 16px;
            font-size: 11px;
            color: #666;
        }
        
        .avatar-note {
            height: 8px;
            border: 1px solid #ccc;
            width: 150px;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 18px;
        }
        
        .label {
            height: 10px;
            border: 1px solid #999;
            width: 100px;
            margin-bottom: 8px;
        }
        
        .input-field {
            height: 35px;
            border: 2px solid #999;
            width: 100%;
            background-color: #fafafa;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-start;
            margin-top: 25px;
        }
        
        .btn {
            border: 2px solid #666;
            padding: 10px 25px;
            font-size: 11px;
            color: #666;
        }
        
        .btn.primary {
            border-color: #333;
            background-color: #f5f5f5;
        }
        
        /* Password Section */
        .helper-text {
            height: 8px;
            border: 1px solid #ccc;
            width: 130px;
            margin-top: 5px;
        }
        
        /* Info Section */
        .info-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-icon {
            width: 20px;
            height: 20px;
            border: 2px solid #999;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .info-content {
            flex: 1;
        }
        
        .info-label {
            height: 10px;
            border: 1px solid #999;
            width: 100px;
            margin-bottom: 6px;
        }
        
        .info-value {
            height: 12px;
            border: 1px solid #666;
            width: 150px;
        }
        
    </style>
</head>
<body>
    
    <div class="wireframe">
        
        <header class="header">
            <div class="header-box logo">LOGO</div>
            <div class="header-box user">USER INFO</div>
        </header>
        
        <div class="main">
            
            <aside class="sidebar">
                <div class="nav-title">Navigation</div>
                <div class="nav-item">Dashboard</div>
                <div class="nav-item">Materi</div>
                <div class="nav-item">Soal</div>
                <div class="nav-item">Tugas</div>
                <div class="nav-item">Kelas</div>
                <div class="nav-item">Siswa</div>
                <div class="nav-item">Laporan</div>
                <div class="nav-item">Rekap</div>
            </aside>
            
            <main class="content">
                
                <div class="page-header">
                    <div class="header-icon"></div>
                    <div class="page-title"></div>
                </div>
                
                <div class="main-grid">
                    
                    <!-- Informasi Profile -->
                    <div class="card" style="grid-row: span 2;">
                        <div class="card-header">
                            <div class="card-icon"></div>
                            <div class="card-title"></div>
                        </div>
                        
                        <div class="avatar-section">
                            <div class="avatar-box"></div>
                            <div class="avatar-actions">
                                <div class="avatar-btn">UPLOAD</div>
                                <div class="avatar-btn">RESET</div>
                                <div class="avatar-note"></div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <div class="label"></div>
                            <div class="input-field"></div>
                        </div>
                        
                        <div class="form-group">
                            <div class="label"></div>
                            <div class="input-field"></div>
                        </div>
                        
                        <div class="form-group">
                            <div class="label"></div>
                            <div class="input-field"></div>
                        </div>
                        
                        <div class="form-actions">
                            <div class="btn primary">SIMPAN</div>
                            <div class="btn">RESET</div>
                        </div>
                    </div>
                    
                    <!-- Ubah Password -->
                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon"></div>
                            <div class="card-title"></div>
                        </div>
                        
                        <div class="form-group">
                            <div class="label"></div>
                            <div class="input-field"></div>
                        </div>
                        
                        <div class="form-group">
                            <div class="label"></div>
                            <div class="input-field"></div>
                            <div class="helper-text"></div>
                        </div>
                        
                        <div class="form-group">
                            <div class="label"></div>
                            <div class="input-field"></div>
                        </div>
                        
                        <div class="form-actions">
                            <div class="btn primary">UPDATE</div>
                        </div>
                    </div>
                    
                    <!-- Informasi Akun -->
                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon"></div>
                            <div class="card-title"></div>
                        </div>
                        
                        <div class="info-list">
                            <div class="info-item">
                                <div class="info-icon"></div>
                                <div class="info-content">
                                    <div class="info-label"></div>
                                    <div class="info-value"></div>
                                </div>
                            </div>
                            
                            <div class="info-item">
                                <div class="info-icon"></div>
                                <div class="info-content">
                                    <div class="info-label"></div>
                                    <div class="info-value"></div>
                                </div>
                            </div>
                            
                            <div class="info-item">
                                <div class="info-icon"></div>
                                <div class="info-content">
                                    <div class="info-label"></div>
                                    <div class="info-value"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                </div>
                
            </main>
            
        </div>
        
    </div>
    
</body>
</html>
