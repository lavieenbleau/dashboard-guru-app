<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelas Online - Lo-Fi Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background-color: #fafafa;
            padding: 40px;
        }
        
        .wireframe {
            max-width: 1400px;
            margin: 0 auto;
            border: 2px solid #333;
            background-color: #fff;
        }
        
        .header {
            border-bottom: 2px solid #333;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-box {
            border: 2px solid #666;
            padding: 8px 16px;
            font-size: 11px;
            color: #666;
        }
        
        .header-box.logo {
            width: 100px;
        }
        
        .header-box.user {
            width: 150px;
        }
        
        .main {
            display: grid;
            grid-template-columns: 200px 1fr;
            min-height: 600px;
        }
        
        .sidebar {
            border-right: 2px solid #333;
            padding: 30px 20px;
        }
        
        .nav-title {
            font-size: 10px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-item {
            border: 1px solid #999;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 11px;
            color: #666;
        }
        
        .nav-item.active {
            border: 2px solid #333;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .content {
            padding: 30px 40px;
        }
        
        .page-header {
            margin-bottom: 30px;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .page-title {
            height: 25px;
            border: 2px solid #333;
            width: 180px;
            margin-bottom: 10px;
        }
        
        .page-subtitle {
            height: 10px;
            border: 1px solid #ccc;
            width: 250px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            border: 2px solid #666;
            padding: 10px 20px;
            font-size: 11px;
            color: #666;
        }
        
        .btn.primary {
            border-color: #333;
            background-color: #f5f5f5;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
        }
        
        .tab {
            border: 1px solid #999;
            border-bottom: none;
            padding: 12px 25px;
            font-size: 11px;
            color: #666;
            position: relative;
            top: 2px;
        }
        
        .tab.active {
            border: 2px solid #333;
            border-bottom: 2px solid #fff;
            background-color: #fff;
            color: #333;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            border: 2px solid #ddd;
            background-color: #fafafa;
        }
        
        .empty-icon {
            width: 80px;
            height: 80px;
            border: 2px solid #ccc;
            margin: 0 auto 25px;
        }
        
        .empty-title {
            height: 18px;
            border-bottom: 2px solid #999;
            width: 200px;
            margin: 0 auto 15px;
        }
        
        .empty-text {
            height: 12px;
            border: 1px solid #ccc;
            width: 300px;
            margin: 0 auto;
        }
        
        /* Meeting List (for other tabs) */
        .meeting-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .meeting-card {
            border: 2px solid #666;
            padding: 25px;
            background-color: #fff;
        }
        
        .meeting-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .meeting-title {
            height: 18px;
            border-bottom: 2px solid #333;
            width: 250px;
            margin-bottom: 10px;
        }
        
        .meeting-time {
            height: 12px;
            border: 1px solid #999;
            width: 200px;
        }
        
        .meeting-badge {
            border: 2px solid #666;
            padding: 6px 15px;
            font-size: 9px;
            color: #666;
        }
        
        .meeting-footer {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #ddd;
        }
        
        .meeting-btn {
            border: 2px solid #666;
            padding: 8px 20px;
            font-size: 11px;
            color: #666;
        }
        
    </style>
</head>
<body>
    
    <div class="wireframe">
        
        <header class="header">
            <div class="header-box logo">LOGO</div>
            <div class="header-box user">USER INFO</div>
        </header>
        
        <div class="main">
            
            <aside class="sidebar">
                <div class="nav-title">Navigation</div>
                <div class="nav-item">Dashboard</div>
                <div class="nav-item">Materi</div>
                <div class="nav-item">Soal</div>
                <div class="nav-item">Tugas</div>
                <div class="nav-item">Kelas</div>
                <div class="nav-item">Siswa</div>
                <div class="nav-item">Laporan</div>
                <div class="nav-item">Rekap</div>
                <div class="nav-item active">Kelas Online</div>
            </aside>
            
            <main class="content">
                
                <div class="page-header">
                    <div class="header-top">
                        <div>
                            <div class="page-title"></div>
                            <div class="page-subtitle"></div>
                        </div>
                        <div class="action-buttons">
                            <div class="btn">QUICK START</div>
                            <div class="btn primary">JADWALKAN</div>
                        </div>
                    </div>
                </div>
                
                <div class="tabs">
                    <div class="tab active">Sedang Berlangsung</div>
                    <div class="tab">Akan Datang</div>
                    <div class="tab">Riwayat</div>
                </div>
                
                <!-- Empty State -->
                <div class="empty-state">
                    <div class="empty-icon"></div>
                    <div class="empty-title"></div>
                    <div class="empty-text"></div>
                </div>
                
                <!-- Example: Meeting List (hidden by default, shown in other tabs) -->
                <!-- 
                <div class="meeting-list" style="display: none;">
                    <div class="meeting-card">
                        <div class="meeting-header">
                            <div>
                                <div class="meeting-title"></div>
                                <div class="meeting-time"></div>
                            </div>
                            <div class="meeting-badge">STATUS</div>
                        </div>
                        <div class="meeting-footer">
                            <div class="meeting-btn">JOIN</div>
                            <div class="meeting-btn">DETAIL</div>
                        </div>
                    </div>
                </div>
                -->
                
            </main>
            
        </div>
        
    </div>
    
</body>
</html>
