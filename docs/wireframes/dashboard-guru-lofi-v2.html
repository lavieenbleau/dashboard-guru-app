<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru - Wireframe Lo-Fi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        /* Container */
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 60px;
            background-color: #fff;
            border-right: 1px solid #e0e0e0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .sidebar-icon {
            width: 30px;
            height: 30px;
            background-color: #e0e0e0;
            border-radius: 5px;
        }
        
        .sidebar-icon.active {
            background-color: #b0b0b0;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px 40px;
        }
        
        /* Header Section */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .greeting {
            flex: 1;
        }
        
        .greeting-title {
            height: 20px;
            background-color: #d0d0d0;
            width: 250px;
            margin-bottom: 10px;
        }
        
        .greeting-subtitle {
            height: 12px;
            background-color: #e8e8e8;
            width: 200px;
        }
        
        .user-info-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #d0d0d0;
        }
        
        .user-text {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .user-line {
            height: 10px;
            background-color: #e0e0e0;
            width: 80px;
        }
        
        /* Cards Row 1 - 4 Cards */
        .cards-row-1 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card-small {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            padding: 20px;
            min-height: 110px;
        }
        
        .card-header {
            height: 12px;
            background-color: #d0d0d0;
            width: 60px;
            margin-bottom: 15px;
        }
        
        .card-number {
            height: 24px;
            background-color: #c0c0c0;
            width: 40px;
            margin-bottom: 10px;
        }
        
        .card-label {
            height: 10px;
            background-color: #e8e8e8;
            width: 90px;
        }
        
        /* Cards Row 2 - 3 Cards */
        .cards-row-2 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card-medium {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            min-height: 90px;
        }
        
        .card-icon {
            width: 40px;
            height: 40px;
            background-color: #e0e0e0;
            border-radius: 5px;
        }
        
        .card-content {
            flex: 1;
        }
        
        .card-value {
            height: 20px;
            background-color: #c0c0c0;
            width: 30px;
            margin-bottom: 8px;
        }
        
        .card-text {
            height: 10px;
            background-color: #e8e8e8;
            width: 100px;
        }
        
        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 25px;
        }
        
        /* Section */
        .section {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            padding: 25px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .section-icon {
            width: 18px;
            height: 18px;
            background-color: #c0c0c0;
            border-radius: 3px;
        }
        
        .section-title {
            height: 14px;
            background-color: #d0d0d0;
            width: 140px;
        }
        
        /* Activity Items */
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .activity-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .activity-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        
        .activity-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #e0e0e0;
            flex-shrink: 0;
        }
        
        .activity-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .activity-line {
            height: 11px;
            background-color: #d8d8d8;
        }
        
        .activity-line.name {
            width: 120px;
            background-color: #c0c0c0;
        }
        
        .activity-line.detail {
            width: 180px;
        }
        
        .activity-line.time {
            width: 80px;
            background-color: #e8e8e8;
        }
        
        .activity-badge {
            width: 70px;
            height: 28px;
            background-color: #e0e0e0;
            border-radius: 4px;
            flex-shrink: 0;
        }
        
        /* Meeting Section */
        .meeting-content {
            text-align: center;
            padding: 40px 20px;
        }
        
        .meeting-icon {
            width: 70px;
            height: 70px;
            background-color: #e8e8e8;
            border-radius: 5px;
            margin: 0 auto 20px;
        }
        
        .meeting-text {
            height: 11px;
            background-color: #d8d8d8;
            width: 180px;
            margin: 0 auto 20px;
        }
        
        .meeting-button {
            height: 35px;
            background-color: #d0d0d0;
            width: 130px;
            margin: 0 auto;
            border-radius: 4px;
        }
        
    </style>
</head>
<body>
    
    <div class="container">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-icon active"></div>
            <div class="sidebar-icon"></div>
            <div class="sidebar-icon"></div>
            <div class="sidebar-icon"></div>
            <div class="sidebar-icon"></div>
            <div class="sidebar-icon"></div>
            <div class="sidebar-icon"></div>
            <div class="sidebar-icon"></div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            
            <!-- Header Section -->
            <div class="header-section">
                <div class="greeting">
                    <div class="greeting-title"></div>
                    <div class="greeting-subtitle"></div>
                </div>
                <div class="user-info-section">
                    <div class="user-avatar"></div>
                    <div class="user-text">
                        <div class="user-line"></div>
                        <div class="user-line"></div>
                    </div>
                </div>
            </div>
            
            <!-- 4 Cards Row -->
            <div class="cards-row-1">
                <div class="card-small">
                    <div class="card-header"></div>
                    <div class="card-number"></div>
                    <div class="card-label"></div>
                </div>
                <div class="card-small">
                    <div class="card-header"></div>
                    <div class="card-number"></div>
                    <div class="card-label"></div>
                </div>
                <div class="card-small">
                    <div class="card-header"></div>
                    <div class="card-number"></div>
                    <div class="card-label"></div>
                </div>
                <div class="card-small">
                    <div class="card-header"></div>
                    <div class="card-number"></div>
                    <div class="card-label"></div>
                </div>
            </div>
            
            <!-- 3 Cards Row -->
            <div class="cards-row-2">
                <div class="card-medium">
                    <div class="card-icon"></div>
                    <div class="card-content">
                        <div class="card-value"></div>
                        <div class="card-text"></div>
                    </div>
                </div>
                <div class="card-medium">
                    <div class="card-icon"></div>
                    <div class="card-content">
                        <div class="card-value"></div>
                        <div class="card-text"></div>
                    </div>
                </div>
                <div class="card-medium">
                    <div class="card-icon"></div>
                    <div class="card-content">
                        <div class="card-value"></div>
                        <div class="card-text"></div>
                    </div>
                </div>
            </div>
            
            <!-- Content Grid -->
            <div class="content-grid">
                
                <!-- Aktivitas Terbaru -->
                <div class="section">
                    <div class="section-header">
                        <div class="section-icon"></div>
                        <div class="section-title"></div>
                    </div>
                    
                    <div class="activity-list">
                        <div class="activity-item">
                            <div class="activity-avatar"></div>
                            <div class="activity-content">
                                <div class="activity-line name"></div>
                                <div class="activity-line detail"></div>
                                <div class="activity-line time"></div>
                            </div>
                            <div class="activity-badge"></div>
                        </div>
                        
                        <div class="activity-item">
                            <div class="activity-avatar"></div>
                            <div class="activity-content">
                                <div class="activity-line name"></div>
                                <div class="activity-line detail"></div>
                                <div class="activity-line time"></div>
                            </div>
                            <div class="activity-badge"></div>
                        </div>
                        
                        <div class="activity-item">
                            <div class="activity-avatar"></div>
                            <div class="activity-content">
                                <div class="activity-line name"></div>
                                <div class="activity-line detail"></div>
                                <div class="activity-line time"></div>
                            </div>
                            <div class="activity-badge"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Meeting Mendatang -->
                <div class="section">
                    <div class="section-header">
                        <div class="section-icon"></div>
                        <div class="section-title"></div>
                    </div>
                    
                    <div class="meeting-content">
                        <div class="meeting-icon"></div>
                        <div class="meeting-text"></div>
                        <div class="meeting-button"></div>
                    </div>
                </div>
                
            </div>
            
        </main>
        
    </div>
    
</body>
</html>
