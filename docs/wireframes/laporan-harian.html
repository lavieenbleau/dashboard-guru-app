<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Harian - Lo-Fi Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background-color: #fafafa;
            padding: 40px;
        }
        
        .wireframe {
            max-width: 1400px;
            margin: 0 auto;
            border: 2px solid #333;
            background-color: #fff;
        }
        
        .header {
            border-bottom: 2px solid #333;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-box {
            border: 2px solid #666;
            padding: 8px 16px;
            font-size: 11px;
            color: #666;
        }
        
        .header-box.logo {
            width: 100px;
        }
        
        .header-box.user {
            width: 150px;
        }
        
        .main {
            display: grid;
            grid-template-columns: 200px 1fr;
            min-height: 600px;
        }
        
        .sidebar {
            border-right: 2px solid #333;
            padding: 30px 20px;
        }
        
        .nav-title {
            font-size: 10px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-item {
            border: 1px solid #999;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 11px;
            color: #666;
        }
        
        .nav-item.active {
            border: 2px solid #333;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .content {
            padding: 30px 40px;
        }
        
        .breadcrumb {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #ddd;
        }
        
        .breadcrumb-line {
            height: 10px;
            border: 1px solid #ccc;
            width: 250px;
        }
        
        .page-header {
            margin-bottom: 30px;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .title-icon {
            width: 30px;
            height: 30px;
            border: 2px solid #999;
        }
        
        .page-title {
            height: 25px;
            border: 2px solid #333;
            width: 200px;
        }
        
        .page-subtitle {
            height: 10px;
            border: 1px solid #ccc;
            width: 350px;
            margin-left: 42px;
        }
        
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }
        
        /* Calendar Section */
        .calendar-wrapper {
            border: 2px solid #666;
            padding: 25px;
            background-color: #fff;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .month-title {
            height: 18px;
            border-bottom: 2px solid #666;
            width: 120px;
        }
        
        .calendar-nav {
            display: flex;
            gap: 8px;
        }
        
        .nav-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #999;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        
        .day-header {
            padding: 10px 5px;
            text-align: center;
            font-size: 10px;
            color: #999;
            border-bottom: 1px solid #ddd;
        }
        
        .day-cell {
            padding: 12px 8px;
            text-align: center;
            min-height: 45px;
            position: relative;
            border: 1px solid #f0f0f0;
        }
        
        .day-cell.active {
            background-color: #e8e8e8;
            border: 2px solid #666;
        }
        
        .day-cell.has-data::after {
            content: "";
            position: absolute;
            top: 5px;
            right: 5px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #999;
        }
        
        .day-number {
            height: 10px;
            border: 1px solid #ccc;
            width: 20px;
            margin: 0 auto;
        }
        
        /* Detail Section */
        .detail-wrapper {
            border: 2px solid #666;
            padding: 30px;
            background-color: #fff;
        }
        
        .detail-header {
            margin-bottom: 30px;
        }
        
        .detail-date {
            height: 18px;
            border-bottom: 2px solid #666;
            width: 200px;
            margin-bottom: 10px;
        }
        
        .detail-count {
            height: 12px;
            border: 1px solid #999;
            width: 100px;
        }
        
        .detail-empty {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-icon {
            width: 80px;
            height: 80px;
            border: 2px solid #ccc;
            margin: 0 auto 20px;
        }
        
        .empty-text {
            height: 10px;
            border: 1px solid #ccc;
            width: 250px;
            margin: 0 auto;
        }
        
    </style>
</head>
<body>
    
    <div class="wireframe">
        
        <header class="header">
            <div class="header-box logo">LOGO</div>
            <div class="header-box user">USER INFO</div>
        </header>
        
        <div class="main">
            
            <aside class="sidebar">
                <div class="nav-title">Navigation</div>
                <div class="nav-item">Dashboard</div>
                <div class="nav-item">Materi</div>
                <div class="nav-item">Soal</div>
                <div class="nav-item">Tugas</div>
                <div class="nav-item">Kelas</div>
                <div class="nav-item">Siswa</div>
                <div class="nav-item active">Laporan</div>
                <div class="nav-item">Rekap</div>
            </aside>
            
            <main class="content">
                
                <div class="breadcrumb">
                    <div class="breadcrumb-line"></div>
                </div>
                
                <div class="page-header">
                    <div class="header-title">
                        <div class="title-icon"></div>
                        <div class="page-title"></div>
                    </div>
                    <div class="page-subtitle"></div>
                </div>
                
                <div class="main-grid">
                    
                    <!-- Calendar -->
                    <div class="calendar-wrapper">
                        <div class="calendar-header">
                            <div class="month-title"></div>
                            <div class="calendar-nav">
                                <div class="nav-btn"></div>
                                <div class="nav-btn"></div>
                            </div>
                        </div>
                        
                        <div class="calendar-grid">
                            <div class="day-header">Min</div>
                            <div class="day-header">Sen</div>
                            <div class="day-header">Sel</div>
                            <div class="day-header">Rab</div>
                            <div class="day-header">Kam</div>
                            <div class="day-header">Jum</div>
                            <div class="day-header">Sab</div>
                            
                            <div class="day-cell"></div>
                            <div class="day-cell"></div>
                            <div class="day-cell"></div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell has-data">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell active">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell has-data">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                            <div class="day-cell">
                                <div class="day-number"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Detail -->
                    <div class="detail-wrapper">
                        <div class="detail-header">
                            <div class="detail-date"></div>
                            <div class="detail-count"></div>
                        </div>
                        
                        <div class="detail-empty">
                            <div class="empty-icon"></div>
                            <div class="empty-text"></div>
                        </div>
                    </div>
                    
                </div>
                
            </main>
            
        </div>
        
    </div>
    
</body>
</html>
