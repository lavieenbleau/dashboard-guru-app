<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelas - Lo-Fi Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background-color: #fafafa;
            padding: 40px;
        }
        
        .wireframe {
            max-width: 1400px;
            margin: 0 auto;
            border: 2px solid #333;
            background-color: #fff;
        }
        
        .header {
            border-bottom: 2px solid #333;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-box {
            border: 2px solid #666;
            padding: 8px 16px;
            font-size: 11px;
            color: #666;
        }
        
        .header-box.logo {
            width: 100px;
        }
        
        .header-box.user {
            width: 150px;
        }
        
        .main {
            display: grid;
            grid-template-columns: 200px 1fr;
            min-height: 600px;
        }
        
        .sidebar {
            border-right: 2px solid #333;
            padding: 30px 20px;
        }
        
        .nav-title {
            font-size: 10px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-item {
            border: 1px solid #999;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 11px;
            color: #666;
        }
        
        .nav-item.active {
            border: 2px solid #333;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .content {
            padding: 30px 40px;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #ccc;
        }
        
        .page-title {
            height: 25px;
            border: 2px solid #333;
            width: 200px;
        }
        
        .btn {
            border: 2px solid #666;
            padding: 8px 20px;
            font-size: 11px;
            color: #666;
        }
        
        .btn.primary {
            border-color: #333;
            background-color: #f5f5f5;
        }
        
        /* Class Grid */
        .class-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }
        
        .class-card {
            border: 2px solid #666;
            padding: 0;
            overflow: hidden;
            cursor: pointer;
        }
        
        .class-card:hover {
            background-color: #fafafa;
        }
        
        .class-header {
            padding: 20px;
            border-bottom: 2px solid #666;
            background-color: #f9f9f9;
        }
        
        .class-name {
            height: 18px;
            border-bottom: 2px solid #666;
            width: 70%;
            margin-bottom: 10px;
        }
        
        .class-code {
            height: 10px;
            border: 1px solid #999;
            width: 50%;
        }
        
        .class-body {
            padding: 20px;
        }
        
        .class-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .stat-item {
            border: 1px solid #ccc;
            padding: 10px;
        }
        
        .stat-value {
            height: 20px;
            border-bottom: 2px solid #999;
            width: 40%;
            margin-bottom: 8px;
        }
        
        .stat-label {
            height: 10px;
            border: 1px solid #ccc;
            width: 70%;
        }
        
        .class-footer {
            padding: 15px 20px;
            border-top: 1px dashed #ddd;
            display: flex;
            justify-content: space-between;
        }
        
        .footer-btn {
            height: 25px;
            border: 1px solid #999;
            width: 45%;
        }
        
    </style>
</head>
<body>
    
    <div class="wireframe">
        
        <header class="header">
            <div class="header-box logo">LOGO</div>
            <div class="header-box user">USER INFO</div>
        </header>
        
        <div class="main">
            
            <aside class="sidebar">
                <div class="nav-title">Navigation</div>
                <div class="nav-item">Dashboard</div>
                <div class="nav-item">Materi</div>
                <div class="nav-item">Soal</div>
                <div class="nav-item">Tugas</div>
                <div class="nav-item active">Kelas</div>
                <div class="nav-item">Siswa</div>
                <div class="nav-item">Laporan</div>
                <div class="nav-item">Rekap</div>
            </aside>
            
            <main class="content">
                
                <div class="page-header">
                    <div class="page-title"></div>
                    <div class="btn primary">+ TAMBAH KELAS</div>
                </div>
                
                <div class="class-grid">
                    
                    <div class="class-card">
                        <div class="class-header">
                            <div class="class-name"></div>
                            <div class="class-code"></div>
                        </div>
                        <div class="class-body">
                            <div class="class-stats">
                                <div class="stat-item">
                                    <div class="stat-value"></div>
                                    <div class="stat-label"></div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value"></div>
                                    <div class="stat-label"></div>
                                </div>
                            </div>
                        </div>
                        <div class="class-footer">
                            <div class="footer-btn"></div>
                            <div class="footer-btn"></div>
                        </div>
                    </div>
                    
                    <div class="class-card">
                        <div class="class-header">
                            <div class="class-name"></div>
                            <div class="class-code"></div>
                        </div>
                        <div class="class-body">
                            <div class="class-stats">
                                <div class="stat-item">
                                    <div class="stat-value"></div>
                                    <div class="stat-label"></div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value"></div>
                                    <div class="stat-label"></div>
                                </div>
                            </div>
                        </div>
                        <div class="class-footer">
                            <div class="footer-btn"></div>
                            <div class="footer-btn"></div>
                        </div>
                    </div>
                    
                    <div class="class-card">
                        <div class="class-header">
                            <div class="class-name"></div>
                            <div class="class-code"></div>
                        </div>
                        <div class="class-body">
                            <div class="class-stats">
                                <div class="stat-item">
                                    <div class="stat-value"></div>
                                    <div class="stat-label"></div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value"></div>
                                    <div class="stat-label"></div>
                                </div>
                            </div>
                        </div>
                        <div class="class-footer">
                            <div class="footer-btn"></div>
                            <div class="footer-btn"></div>
                        </div>
                    </div>
                    
                    <div class="class-card">
                        <div class="class-header">
                            <div class="class-name"></div>
                            <div class="class-code"></div>
                        </div>
                        <div class="class-body">
                            <div class="class-stats">
                                <div class="stat-item">
                                    <div class="stat-value"></div>
                                    <div class="stat-label"></div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value"></div>
                                    <div class="stat-label"></div>
                                </div>
                            </div>
                        </div>
                        <div class="class-footer">
                            <div class="footer-btn"></div>
                            <div class="footer-btn"></div>
                        </div>
                    </div>
                    
                </div>
                
            </main>
            
        </div>
        
    </div>
    
</body>
</html>
